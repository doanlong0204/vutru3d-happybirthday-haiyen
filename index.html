        function playMusic() {
            if (!isMusicPlaying) {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.innerHTML = '🔊 Bật';
                }).catch(err => {
                    console.log("Chờ người dùng tương tác để phát nhạc...", err);
                });
            }
        }

            playMusic();
        }, { once: true });

            e.stopPropagation(); 
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.innerHTML = '🔇 Tắt';
            } else {
                bgMusic.play();
                isMusicPlaying = true;
                musicBtn.innerHTML = '🔊 Bật';
            }
        });

            e.stopPropagation();

                musicBtn.innerHTML = '🔊 Bật';
            }).catch(err => console.log(err));

            let nextIndex = musicSelect.selectedIndex + 1;

                nextIndex = 0; 
            }
            musicSelect.selectedIndex = nextIndex;
            bgMusic.src = musicSelect.value;

        const canvas = document.getElementById('canvas3d');

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);

        // --- HỆ THỐNG CUSTOM SHADER BẺ CONG KHÔNG GIAN (GRAVITATIONAL LENSING) ---
        const GravitationalLensingShader = {
            uniforms: {
                'tDiffuse': { value: null },
                'uCenter': { value: new THREE.Vector2(0.5, 0.5) },
                'uRadius': { value: 0.025 },
                'uStrength': { value: 0.0012 },
                'uAspect': { value: window.innerWidth / window.innerHeight }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform vec2 uCenter;
                uniform float uRadius;
                uniform float uStrength;
                uniform float uAspect;
                varying vec2 vUv;
                void main() {
                    vec2 uv = vUv;
                    vec2 diff = uv - uCenter;
                    diff.x *= uAspect;
                    float dist = length(diff);
                    
                    if (dist > uRadius) {
                        float falloff = 1.0 / (dist * 18.0);
                        vec2 distort = normalize(vUv - uCenter) * (uStrength * falloff);
                        uv -= distort;
                    }
                    gl_FragColor = texture2D(tDiffuse, uv);
                }
            `
        };

        const lensingPass = new THREE.ShaderPass(GravitationalLensingShader);

            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctxN.fillStyle = grad;
            ctxN.fillRect(0, 0, 512, 512);
            return new THREE.CanvasTexture(canvasNebula);
        }

        // --- 4. Khởi Tạo Dữ Liệu Lời Chúc và Hình Ảnh ---
        const rawContents = [

        const floatingItems = [];

        function createRoundedImageTexture(imageUrl) {
            if (textureCache[imageUrl]) return textureCache[imageUrl];

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const size = 512;
            canvas.width = size;
            canvas.height = size;
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = imageUrl;
            
            const texture = new THREE.CanvasTexture(canvas);
            
            img.onload = function() {
                ctx.clearRect(0, 0, size, size);
                const radius = 60;
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                
                ctx.clip();
                ctx.drawImage(img, 0, 0, size, size);
                texture.needsUpdate = true;
            };
            
            textureCache[imageUrl] = texture;
            return texture;
        }

        function createTextTexture(text) {

            ctxText.fillStyle = '#ffffff';

            ctxText.shadowColor = '#ff69b4';
            ctxText.shadowBlur = 15;
            ctxText.fillText(text, 256, 70);
            
            const texture = new THREE.CanvasTexture(canvasText);
            textureCache['text_' + text] = texture;
            return texture;
        }

        // --- Hệ thống Pháo hoa 3D ---
        const fireworks = [];
        const fireworkGeometry = new THREE.BufferGeometry();
        const fireworkPositions = new Float32Array(300 * 3);
        const fireworkColors = new Float32Array(300 * 3);
        const fireworkOpacities = new Float32Array(300);
        
        fireworkGeometry.setAttribute('position', new THREE.BufferAttribute(fireworkPositions, 3));
        fireworkGeometry.setAttribute('color', new THREE.BufferAttribute(fireworkColors, 3));
        fireworkGeometry.setAttribute('opacity', new THREE.BufferAttribute(fireworkOpacities, 1));
        
        const fireworkMaterial = new THREE.PointsMaterial({
            size: 1.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        
        const fireworkSystem = new THREE.Points(fireworkGeometry, fireworkMaterial);
        scene.add(fireworkSystem);
        
        function createFirework(position) {
            const colors = [0xff69b4, 0xff2a6d, 0xff8ebb, 0xffffff, 0xffd700];
            const particleCount = 30;
            
            for (let i = 0; i < particleCount; i++) {
                if (fireworks.length >= 300) break;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = 0.5 + Math.random() * 1.5;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                fireworks.push({
                    position: position.clone(),
                    velocity: new THREE.Vector3(
                        Math.cos(angle) * speed,
                        (Math.random() - 0.5) * speed,
                        Math.sin(angle) * speed
                    ),
                    life: 1.0,
                    color: new THREE.Color(color)
                });
            }
        }
        
        function updateFireworks() {
            for (let i = 0; i < fireworks.length; i++) {
                const fw = fireworks[i];
                fw.life -= 0.015;
                fw.position.add(fw.velocity);
                fw.velocity.multiplyScalar(0.98);
                
                if (fw.life <= 0) {
                    fireworks.splice(i, 1);
                    i--;
                    continue;
                }
                
                fireworkPositions[i * 3] = fw.position.x;
                fireworkPositions[i * 3 + 1] = fw.position.y;
                fireworkPositions[i * 3 + 2] = fw.position.z;
                
                fireworkColors[i * 3] = fw.color.r;
                fireworkColors[i * 3 + 1] = fw.color.g;
                fireworkColors[i * 3 + 2] = fw.color.b;
                
                fireworkOpacities[i] = fw.life;
            }
            
            for (let i = fireworks.length; i < 300; i++) {
                fireworkPositions[i * 3] = 0;
                fireworkPositions[i * 3 + 1] = 0;
                fireworkPositions[i * 3 + 2] = 0;
                fireworkOpacities[i] = 0;
            }
            
            fireworkGeometry.attributes.position.needsUpdate = true;
            fireworkGeometry.attributes.color.needsUpdate = true;
            fireworkGeometry.attributes.opacity.needsUpdate = true;
        }

        function resetItemPosition(mesh, isFirstTime = false) {

        }

        // --- ĐÃ PHỤC HỒI VỀ 2D PLANE (KHÔNG KHỐI HỘP - KHÔNG VIỀN NEON) ---
        contents.forEach((data, index) => {
            let geometry;
            let material;

            if (data.type === 'text') {
                const textTexture = createTextTexture(data.value);
                geometry = new THREE.PlaneGeometry(72, 18); 
                material = new THREE.MeshBasicMaterial({ map: textTexture, transparent: true, side: THREE.DoubleSide });
            } else {
                const imgTexture = createRoundedImageTexture(data.value);
                geometry = new THREE.PlaneGeometry(28, 28); 
                material = new THREE.MeshBasicMaterial({ map: imgTexture, transparent: true, side: THREE.DoubleSide });
            }

            const mesh = new THREE.Mesh(geometry, material);
            resetItemPosition(mesh, true); 

            mesh.userData = {
                speed: 0.25 + Math.random() * 0.35, 
                delay: index * 8 
            };

            scene.add(mesh);
            floatingItems.push(mesh);
        });

        // --- Raycaster & Tương tác chuột ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let selectedItem = null;
        let originalCameraPos = null;
        let isZoomed = false;
        
        let mouseWorldPos = new THREE.Vector3();
        let mousePlane = new THREE.Plane();
        
        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            const cameraDirection = new THREE.Vector3();
            camera.getWorldDirection(cameraDirection);
            mousePlane.setFromNormalAndCoplanarPoint(cameraDirection.clone().negate(), new THREE.Vector3(0, 0, 0));
            raycaster.ray.intersectPlane(mousePlane, mouseWorldPos);
        }
        
        window.addEventListener('mousemove', onMouseMove);

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(floatingItems);

            if (intersects.length > 0) {
                const clickedItem = intersects[0].object;
                
                if (!isZoomed) {
                    selectedItem = clickedItem;
                    originalCameraPos = camera.position.clone();
                    selectedItem.userData.originalSpeed = selectedItem.userData.speed;
                    selectedItem.userData.speed = 0; 
                    
                    controls.enabled = false;
                    
                    const targetPos = clickedItem.position.clone().add(new THREE.Vector3(0, 0, 60));
                    camera.position.copy(targetPos);
                    camera.lookAt(clickedItem.position);
                    
                    selectedItem.scale.set(2, 2, 2);
                    isZoomed = true;
                } else if (selectedItem === clickedItem) {
                    selectedItem.userData.speed = selectedItem.userData.originalSpeed;
                    selectedItem.scale.set(1, 1, 1);
                    
                    if (originalCameraPos) {
                        camera.position.copy(originalCameraPos);
                    }
                    
                    controls.enabled = true; 
                    controls.target.set(0, 0, 0);
                    
                    selectedItem = null;
                    isZoomed = false;
                }
            } else if (isZoomed) {
                if (selectedItem) {
                    selectedItem.userData.speed = selectedItem.userData.originalSpeed;
                    selectedItem.scale.set(1, 1, 1);
                }
                
                if (originalCameraPos) {
                    camera.position.copy(originalCameraPos);
                }
                
                controls.enabled = true;
                controls.target.set(0, 0, 0);
                
                selectedItem = null;
                isZoomed = false;
            }
        }

        window.addEventListener('click', onMouseClick);

        // --- 5. Hàm Vòng Lặp Hoạt Họa ---
        const clock = new THREE.Clock();
        const maxTravelDistance = 500; 

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            accretionDisk.rotation.y = elapsedTime * -1.0; 
            singularity.rotation.y = elapsedTime * 0.12;

            nebulaGroup.children.forEach(cloud => {
                cloud.rotation.z += cloud.userData.rotSpeed * 0.2;
            });

            floatingItems.forEach((item) => {
                if(item.userData.delay > 0) {
                    item.userData.delay--;
                    item.visible = false;
                    return;
                }
                item.visible = true;

                item.lookAt(camera.position);

                const distanceToCenter = item.position.length();

                if (distanceToCenter < maxTravelDistance) {
                    const direction = item.position.clone().normalize();
                    if(direction.length() === 0) direction.set(1, 0, 0); 
                    
                    item.position.add(direction.multiplyScalar(item.userData.speed));
                    
                    const distanceToMouse = item.position.distanceTo(mouseWorldPos);
                    if (distanceToMouse < 80 && distanceToMouse > 0 && !isZoomed) {
                        const pushDirection = item.position.clone().sub(mouseWorldPos).normalize();
                        const pushStrength = (80 - distanceToMouse) * 0.02;
                        item.position.add(pushDirection.multiplyScalar(pushStrength));
                    }
                    
                    item.position.y += Math.sin(elapsedTime * 2 + distanceToCenter * 0.05) * 0.15;

                    if (distanceToCenter < 120) {
                        const scaleFactor = (distanceToCenter - 16) / 104; 
                        const clampedScale = Math.max(0, Math.min(1, scaleFactor));
                        item.scale.set(clampedScale, clampedScale, clampedScale);
                    } else if (distanceToCenter > maxTravelDistance - 80) {
                        const scaleFactor = (maxTravelDistance - distanceToCenter) / 80;
                        const clampedScale = Math.max(0, Math.min(1, scaleFactor));
                        item.scale.set(clampedScale, clampedScale, clampedScale);
                    } else if (!isZoomed || item !== selectedItem) {
                        item.scale.set(1, 1, 1);
                    }
                } else {
                    createFirework(item.position.clone());
                    resetItemPosition(item);
                }
            });

            updateFireworks();

            if (!isZoomed) {
                controls.update();
            }
            
            composer.render();
        }

        animate();

        // --- 6. Định Dạng Lại Khi Thay Đổi Kích Thước Màn Hình ---
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            
            renderer.setSize(width, height);
            composer.setSize(width, height);
            
            lensingPass.uniforms.uAspect.value = width / height;
        });
    </script>
</body>
