    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000002;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            z-index: 10;
            pointer-events: none;
            font-size: 0.85rem;
            text-shadow: 0 0 5px #000;
            text-align: center;
            width: 90%;
        }
        .instructions strong {
            font-weight: bold;
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 8px rgba(255, 42, 109, 0.6);
        }
        .tour-caption {
            position: absolute;
            left: 50%;
            top: 72%;
            transform: translate(-50%, -50%);
            z-index: 20;
            max-width: min(640px, 82vw);
            color: #fff;
            font-size: clamp(1.1rem, 3vw, 2.4rem);
            font-weight: 800;
            letter-spacing: 1.2px;
            text-align: center;
            text-shadow: 0 0 18px var(--hud-accent), 0 0 42px rgba(255,255,255,0.35);
            opacity: 0;
            pointer-events: none;
        }
        
        :root {
            --hud-accent: #ff2a6d;
            --hud-accent-soft: rgba(255, 42, 109, 0.24);
        }

        /* Hamburger Menu Button */
        .hamburger-btn {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 110;
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, rgba(12, 20, 35, 0.32), rgba(255, 255, 255, 0.06));
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45), inset 0 0 28px rgba(255, 255, 255, 0.05);
            outline: none;
            border: none;
        }

        .hamburger-btn:hover {
            border-color: rgba(255, 255, 255, 0.42);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), var(--hud-accent-soft));
            box-shadow: 0 0 24px var(--hud-accent-soft), inset 0 0 20px rgba(255,255,255,0.08);
        }

        .hamburger-line {
            width: 22px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 1px;
            transition: all 0.3s ease;
        }

        .hamburger-btn.active .hamburger-line:nth-child(1) {
            transform: rotate(45deg) translate(10px, 10px);
        }

        .hamburger-btn.active .hamburger-line:nth-child(2) {
            opacity: 0;
        }

        .hamburger-btn.active .hamburger-line:nth-child(3) {
            transform: rotate(-45deg) translate(8px, -8px);
        }

        .music-box {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 100;
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 8px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 22px;
            background: linear-gradient(135deg, rgba(12, 20, 35, 0.32), rgba(255, 255, 255, 0.06));
            backdrop-filter: blur(20px) saturate(150%);
            -webkit-backdrop-filter: blur(20px) saturate(150%);
            box-shadow: 0 18px 42px rgba(0, 0, 0, 0.45), inset 0 0 28px rgba(255, 255, 255, 0.05);
            opacity: 0;
            transform: translateX(400px);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .music-box.show {
            opacity: 1;
            transform: translateX(0);
            pointer-events: auto;
        }

        .music-box::before {
            content: "";
            position: absolute;
            inset: 1px;
            border-radius: 21px;
            pointer-events: none;
            background: linear-gradient(110deg, rgba(255,255,255,0.18), rgba(255,255,255,0.02), var(--hud-accent-soft));
            opacity: 0.65;
        }
        .native-select {
            display: none;
        }
        .music-control, .custom-select-trigger, .auto-tour {
            position: relative;
            min-height: 44px;
            background: rgba(255, 255, 255, 0.075);
            border: 0.5px solid rgba(255, 255, 255, 0.22);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: 'Orbitron', 'Rajdhani', 'Arial Narrow', Arial, sans-serif;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: inset 0 0 18px rgba(255,255,255,0.04), 0 0 16px rgba(255, 42, 109, 0.18);
            font-weight: 700;
            outline: none;
        }
        .music-control:hover, .custom-select-trigger:hover, .auto-tour:hover,
        .custom-select.open .custom-select-trigger, .auto-tour.active {
            border-color: rgba(255, 255, 255, 0.42);
            background: linear-gradient(135deg, rgba(255,255,255,0.15), var(--hud-accent-soft));
            box-shadow: 0 0 24px var(--hud-accent-soft), inset 0 0 20px rgba(255,255,255,0.08);
        }
        .custom-select {
            position: relative;
        }
        .custom-select-trigger {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            min-width: 168px;
        }
        .custom-select-trigger::after {
            content: "";
            width: 7px;
            height: 7px;
            border-right: 1.5px solid #fff;
            border-bottom: 1.5px solid #fff;
            transform: rotate(45deg) translateY(-2px);
            opacity: 0.78;
            transition: transform 0.25s ease;
        }
        .custom-select.open .custom-select-trigger::after {
            transform: rotate(225deg) translateY(-2px);
        }
        .custom-options {
            position: absolute;
            right: 0;
            top: calc(100% + 10px);
            min-width: 220px;
            max-height: 310px;
            overflow-y: auto;
            padding: 8px;
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: rgba(5, 8, 18, 0.74);
            backdrop-filter: blur(22px) saturate(160%);
            -webkit-backdrop-filter: blur(22px) saturate(160%);
            box-shadow: 0 18px 48px rgba(0,0,0,0.55), 0 0 28px var(--hud-accent-soft);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-8px) scale(0.98);
            transition: opacity 0.22s ease, transform 0.22s ease;
        }
        .custom-select.open .custom-options {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        .custom-option {
            display: block;
            width: 100%;
            color: rgba(255,255,255,0.86);
            background: transparent;
            border: 0;
            border-radius: 10px;
            padding: 11px 12px;
            text-align: left;
            cursor: pointer;
            font: inherit;
            font-size: 0.76rem;
            letter-spacing: 1px;
            transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease;
        }
        .custom-option:hover, .custom-option.active {
            color: #fff;
            background: linear-gradient(90deg, var(--hud-accent-soft), rgba(255,255,255,0.08));
            transform: translateX(3px);
        }
        .auto-tour.active {
            color: #fff;
            text-shadow: 0 0 10px var(--hud-accent);
        }
        .neural-mode {
            position: relative;
            min-height: 44px;
            background: rgba(255, 255, 255, 0.075);
            border: 0.5px solid rgba(255, 255, 255, 0.22);
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 0.78rem;
            font-family: 'Orbitron', 'Rajdhani', 'Arial Narrow', Arial, sans-serif;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: inset 0 0 18px rgba(255,255,255,0.04), 0 0 16px rgba(255, 42, 109, 0.18);
            font-weight: 700;
            outline: none;
        }
        .neural-mode:hover, .neural-mode.active {
            border-color: rgba(255, 255, 255, 0.42);

            box-shadow: 0 0 24px var(--hud-accent-soft), inset 0 0 20px rgba(255,255,255,0.08);
            color: #fff;
            text-shadow: 0 0 10px var(--hud-accent);
        }

    <script>
        // --- Cấu hình dữ liệu 7 Theme màu sắc ---
        const themes = {
            cyber: { inner: '#ff2a6d', outer: '#ff8ebb', star: '#ffb7d5', nebula: 'rgba(255, 42, 109, 0.35)' },
            emerald: { inner: '#00ffaa', outer: '#70ffca', star: '#b7ffe4', nebula: 'rgba(0, 255, 170, 0.35)' },
            sapphire: { inner: '#05d9e8', outer: '#7bf0f8', star: '#b7f5ff', nebula: 'rgba(5, 217, 232, 0.35)' },
            gold: { inner: '#ffd700', outer: '#ffeb7a', star: '#fff8d5', nebula: 'rgba(255, 215, 0, 0.35)' },
            ruby: { inner: '#ff0000', outer: '#ff6666', star: '#ffb7b7', nebula: 'rgba(255, 0, 0, 0.35)' },
            amethyst: { inner: '#b026ff', outer: '#da9eff', star: '#ebd5ff', nebula: 'rgba(176, 38, 255, 0.35)' },
            monochrome: { inner: '#ffffff', outer: '#aaaaaa', star: '#ffffff', nebula: 'rgba(255, 255, 255, 0.2)' }
        };

        // --- Xử lý Menu Hamburger ---
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const hudPanel = document.getElementById('hudPanel');

        hamburgerBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            hamburgerBtn.classList.toggle('active');
            hudPanel.classList.toggle('show');
        });

        window.addEventListener('click', () => {
            if (hudPanel.classList.contains('show')) {
                hamburgerBtn.classList.remove('active');
                hudPanel.classList.remove('show');
            }
        });

        hudPanel.addEventListener('click', (e) => {
            e.stopPropagation();
        });

        // --- Xử lý Nhạc nền & Màn hình chào mừng ---
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicSelect = document.getElementById('musicSelect');
        const themeSelect = document.getElementById('themeSelect');
        const autoTourBtn = document.getElementById('autoTourBtn');
        const tourCaption = document.getElementById('tourCaption');
        const startBtn = document.getElementById('startBtn');
        const splashScreen = document.getElementById('splashScreen');
        let isMusicPlaying = false;
        let activeThemeKey = themeSelect.value;
        let isAutoTour = false;
        let autoTourTimer = null;
        let autoTourTween = null;

        bgMusic.src = musicSelect.value;

        function buildCustomSelects() {
            document.querySelectorAll('.custom-select').forEach(customSelect => {
                const select = document.getElementById(customSelect.dataset.select);
                const trigger = customSelect.querySelector('.custom-select-trigger');
                const optionBox = customSelect.querySelector('.custom-options');
                if (!select || !trigger || !optionBox) return;

                const syncLabel = () => {
                    const selected = select.options[select.selectedIndex];
                    trigger.textContent = selected ? selected.textContent.trim() : 'SELECT';
                };

                optionBox.innerHTML = '';
                Array.from(select.options).forEach((option, index) => {
                    const button = document.createElement('button');
                    button.type = 'button';
                    button.className = 'custom-option';
                    button.textContent = option.textContent.trim();
                    button.dataset.value = option.value;
                    if (index === select.selectedIndex) button.classList.add('active');
                    button.addEventListener('click', (e) => {
                        e.stopPropagation();
                        select.value = option.value;
                        select.dispatchEvent(new Event('change', { bubbles: true }));
                        customSelect.classList.remove('open');
                    });
                    optionBox.appendChild(button);
                });

                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    document.querySelectorAll('.custom-select.open').forEach(openSelect => {
                        if (openSelect !== customSelect) openSelect.classList.remove('open');
                    });
                    customSelect.classList.toggle('open');
                });

                select.addEventListener('change', () => {
                    syncLabel();
                    optionBox.querySelectorAll('.custom-option').forEach(button => {
                        button.classList.toggle('active', button.dataset.value === select.value);
                    });
                });

                syncLabel();
            });

            window.addEventListener('click', () => {
                document.querySelectorAll('.custom-select.open').forEach(customSelect => customSelect.classList.remove('open'));
            });
        }

        buildCustomSelects();

        startBtn.addEventListener('click', () => {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.innerHTML = '🔊 Bật';
            }).catch(err => console.log("Chờ tương tác...", err));

            gsap.to(splashScreen, {
                opacity: 0,
                duration: 1.2,
                onComplete: () => splashScreen.style.display = 'none'
            });

            gsap.to(camera.position, {
                x: 0,
                y: 100,
                z: 280,
                duration: 2.5,
                ease: "power3.out"
            });
        });

        function toggleMusic(e) {
            e.stopPropagation(); 
            e.preventDefault();
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                musicBtn.innerHTML = '🔇 Tắt';
            } else {
                bgMusic.play().then(() => {
                    isMusicPlaying = true;
                    musicBtn.innerHTML = '🔊 Bật';
                });
            }
        }

        musicBtn.addEventListener('click', toggleMusic);
        musicBtn.addEventListener('touchstart', toggleMusic);

        function changeTrack(e) {
            e.stopPropagation();

        // Tạo mạng lưới thần kinh
        function createNeuralNetwork() {
            if (neuralNetworkLines) {
                scene.remove(neuralNetworkLines);
                neuralNetworkLines.geometry.dispose();
                neuralNetworkLines = null;
            }

            const maxConnections = 500; // Số kết nối tối đa
            const connectionDistance = 150; // Khoảng cách tối đa để kết nối

            const linePositions = [];
            const lineColors = [];

            // Lấy vị trí của tất cả các floating items
            const itemPositions = floatingItems.map(item => item.position.clone());

            // Tính toán ma trận khoảng cách và tạo kết nối
            for (let i = 0; i < itemPositions.length; i++) {
                for (let j = i + 1; j < itemPositions.length; j++) {
                    if (linePositions.length / 3 >= maxConnections) break;

                    const distance = itemPositions[i].distanceTo(itemPositions[j]);

                    if (distance < connectionDistance) {
                        // Thêm vị trí đường nối
                        linePositions.push(
                            itemPositions[i].x, itemPositions[i].y, itemPositions[i].z,
                            itemPositions[j].x, itemPositions[j].y, itemPositions[j].z
                        );

                        // Màu sắc dựa trên khoảng cách (càng gần càng sáng)
                        const intensity = 1 - (distance / connectionDistance);
                        const color = new THREE.Color().setHSL(0.8 + Math.random() * 0.4, 1, 0.5 + intensity * 0.5);

                        lineColors.push(color.r, color.g, color.b);
                        lineColors.push(color.r, color.g, color.b);
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));

            neuralNetworkMaterial = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending,
                linewidth: 1
            });

            neuralNetworkLines = new THREE.LineSegments(geometry, neuralNetworkMaterial);
            scene.add(neuralNetworkLines);
        }

        // Cập nhật mạng lưới thần kinh động
        function updateNeuralNetwork() {
            if (!isNeuralMode || !neuralNetworkLines) return;

            const maxConnections = 500;
            const connectionDistance = 150;

            const linePositions = [];
            const lineColors = [];

            const itemPositions = floatingItems.map(item => item.position.clone());

            for (let i = 0; i < itemPositions.length; i++) {
                for (let j = i + 1; j < itemPositions.length; j++) {
                    if (linePositions.length / 3 >= maxConnections) break;

                    const distance = itemPositions[i].distanceTo(itemPositions[j]);

                    if (distance < connectionDistance) {
                        linePositions.push(
                            itemPositions[i].x, itemPositions[i].y, itemPositions[i].z,
                            itemPositions[j].x, itemPositions[j].y, itemPositions[j].z
                        );

                        const intensity = 1 - (distance / connectionDistance);
                        const color = new THREE.Color().setHSL(0.8 + Math.random() * 0.4, 1, 0.5 + intensity * 0.5);

                        lineColors.push(color.r, color.g, color.b);
                        lineColors.push(color.r, color.g, color.b);
                    }
                }
            }

            neuralNetworkLines.geometry.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
            neuralNetworkLines.geometry.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));
            neuralNetworkLines.geometry.attributes.position.needsUpdate = true;
            neuralNetworkLines.geometry.attributes.color.needsUpdate = true;
        }

        function createRoundedImageTexture(imageUrl) {
            if (textureCache[imageUrl]) return textureCache[imageUrl];
            const canvasImg = document.createElement('canvas');
            const ctx = canvasImg.getContext('2d');
            const size = 512;
            canvasImg.width = size;
            canvasImg.height = size;
            
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.src = imageUrl;
            
            const texture = new THREE.CanvasTexture(canvasImg);
            img.onload = function() {
                ctx.clearRect(0, 0, size, size);
                const radius = 60;
                ctx.beginPath();
                ctx.moveTo(radius, 0); ctx.lineTo(size - radius, 0); ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius); ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size); ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius); ctx.quadraticCurveTo(0, 0, radius, 0); ctx.closePath();
                ctx.clip();
                ctx.drawImage(img, 0, 0, size, size);
                texture.needsUpdate = true;
            };
            textureCache[imageUrl] = texture;
            return texture;
        }

        function createTextTexture(text) {
            if (textureCache['text_' + text]) return textureCache['text_' + text];
            const canvasText = document.createElement('canvas');
            const ctxText = canvasText.getContext('2d');
            canvasText.width = 512; canvasText.height = 128;
            ctxText.font = 'Bold 40px Arial'; 
            ctxText.fillStyle = '#ffffff';
            ctxText.textAlign = 'center';
            ctxText.shadowColor = '#ff69b4';
            ctxText.shadowBlur = 12;
            ctxText.fillText(text, 256, 75);
            
            const texture = new THREE.CanvasTexture(canvasText);
            textureCache['text_' + text] = texture;
            return texture;
        }

        function createThemeShockwave(theme) {
            const particleCount = window.innerWidth < 600 ? 520 : 900;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            const inner = new THREE.Color(theme.inner);
            const outer = new THREE.Color(theme.outer);

            for (let i = 0; i < particleCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const elevation = Math.acos(2 * Math.random() - 1);
                const radius = 18 + Math.random() * 8;
                const x = Math.sin(elevation) * Math.cos(angle) * radius;
                const y = Math.cos(elevation) * radius * 0.55;
                const z = Math.sin(elevation) * Math.sin(angle) * radius;
                const mixed = inner.clone().lerp(outer, Math.random());

                positions[i * 3] = x;
                positions[i * 3 + 1] = y;
                positions[i * 3 + 2] = z;
                colors[i * 3] = mixed.r;
                colors[i * 3 + 1] = mixed.g;
                colors[i * 3 + 2] = mixed.b;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: window.innerWidth < 600 ? 3.5 : 4.0,
                vertexColors: true,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            const wave = new THREE.Points(geometry, material);
            wave.scale.set(0.1, 0.1, 0.1);
            scene.add(wave);

            gsap.timeline({
                onComplete: () => {
                    scene.remove(wave);
                    geometry.dispose();
                    material.dispose();
                }
            })
            .to(wave.scale, { x: 34, y: 34, z: 34, duration: 1.35, ease: 'power3.out' }, 0)
            .to(wave.rotation, { y: Math.PI * 1.6, z: Math.PI * 0.35, duration: 1.35, ease: 'power2.out' }, 0)
            .to(material, { opacity: 0, duration: 1.15, ease: 'power2.in' }, 0.2);

                const elevation = (Math.random() - 0.5) * Math.PI;

                    Math.cos(angle) * Math.cos(elevation) * speed,
                    Math.sin(elevation) * speed,
                    Math.sin(angle) * Math.cos(elevation) * speed
                );

                fireworks.push({
                    position: position.clone(),
                    velocity: velocity,
                    life: 1.0, color: new THREE.Color(color)
                });
            }
        }
        
        function updateFireworks() {

                fireworkColors[i * 3 + 2] = fw.color.b;

        function executeInteraction(clientX, clientY) {
            if (splashScreen.style.display !== 'none') return;
            if (clientX < 60 && clientY < 60) return; // Chặn khu vực nút hamburger
            if (clientX > window.innerWidth - 340 && clientY < 80) return; // Chặn khu vực menu

            if (isAutoTour) setAutoTour(false);

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(floatingItems);

            if (intersects.length > 0) {
                const clickedItem = intersects[0].object;
                if (!clickedItem.visible) return;
                
                if (!isZoomed) {
                    selectedItem = clickedItem;
                    originalCameraPos = camera.position.clone();
                    selectedItem.userData.originalSpeed = selectedItem.userData.speed;
                    selectedItem.userData.speed = 0; 
                    
                    controls.enabled = false; 
                    
                    const zoomDistance = window.innerWidth < 600 ? 55 : 45;
                    const targetPos = clickedItem.position.clone().add(
                        new THREE.Vector3(0, 0, zoomDistance).applyQuaternion(camera.quaternion)
                    );

                    gsap.timeline({
                        onComplete: () => {
                            camera.lookAt(clickedItem.position);
                        }
                    })
                    .to(camera.position, {
                        x: targetPos.x,
                        y: targetPos.y,
                        z: targetPos.z,
                        duration: 1.2,
                        ease: "power2.inOut"
                    }, 0)
                    .to(controls.target, {
                        x: clickedItem.position.x,
                        y: clickedItem.position.y,
                        z: clickedItem.position.z,
                        duration: 1.2,
                        ease: "power2.inOut"
                    }, 0)
                    .to(selectedItem.scale, {
                        x: 1.5,
                        y: 1.5,
                        z: 1.5,
                        duration: 0.8,
                        ease: "back.out(1.7)"
                    }, 0.3);
                    
                    isZoomed = true;
                } else if (selectedItem === clickedItem) {
                    closeZoom();
                }
            } else if (isZoomed) {
                closeZoom();
            }
        }

        function closeZoom() {
            if (!selectedItem) return;

            controls.enabled = true; 

            const localItem = selectedItem;
            gsap.to(localItem.scale, {

        function pickTourItem() {
            const imageItems = floatingItems.filter(item => item.visible && item.userData.type === 'image' && item !== selectedItem);
            const pool = imageItems.length ? imageItems : floatingItems.filter(item => item.visible && item !== selectedItem);
            return pool[Math.floor(Math.random() * pool.length)];

        function focusTourItem(item) {
            if (!item) return;
            if (selectedItem && selectedItem !== item) {
                selectedItem.userData.speed = selectedItem.userData.originalSpeed || selectedItem.userData.speed;
                gsap.to(selectedItem.scale, { x: 1, y: 1, z: 1, duration: 0.4, ease: 'power2.out' });
            }

            selectedItem = item;
            originalCameraPos = camera.position.clone();
            selectedItem.userData.originalSpeed = selectedItem.userData.originalSpeed || selectedItem.userData.speed;
            selectedItem.userData.speed = 0;
            isZoomed = true;
            controls.enabled = false;

            const targetDir = item.position.clone().normalize();
            if(targetDir.length() === 0) targetDir.set(0, 0, 1);
            
            // Camera vuông góc với mặt hình ảnh
            const distance = window.innerWidth < 600 ? 60 : 50;
            const cameraOffset = targetDir.multiplyScalar(distance);
            const targetPos = item.position.clone().add(cameraOffset);

            if (autoTourTween) autoTourTween.kill();
            autoTourTween = gsap.timeline({ 
                onComplete: () => {
                    camera.lookAt(item.position);
                    showTourCaption();

                    x: targetPos.x,
                    y: targetPos.y,
                    z: targetPos.z,
                    duration: 2.3,
                    ease: 'power2.inOut',

                    y: item.position.y,

        function runAutoTourStep() {

        function setAutoTour(enabled) {
            isAutoTour = enabled;
            autoTourBtn.classList.toggle('active', enabled);

                canvasN.width = 256; canvasN.height = 256;
                const ctxN = canvasN.getContext('2d');
                const grad = ctxN.createRadialGradient(128, 128, 5, 128, 128, 128);
                grad.addColorStop(0, theme.nebula);
                grad.addColorStop(0.4, theme.nebula.replace('0.35', '0.15')); 
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctxN.fillStyle = grad;
                ctxN.fillRect(0, 0, 256, 256);
                
                cloud.material.map.dispose(); 
                cloud.material.map = new THREE.CanvasTexture(canvasN);
                cloud.material.needsUpdate = true;
            });
        }

        themeSelect.addEventListener('change', (e) => {
            applyTheme(e.target.value);
        });

        // --- 7. VÒNG LẶP HOẠT HỌA ---
const clock = new THREE.Clock();
const maxTravelDistance = 500; 

function animate() {
    requestAnimationFrame(animate);

    if (!isPaused) {
        const elapsedTime = clock.getElapsedTime();

        // Xoay đĩa bồi tụ hố đen
        innerAccretionDisk.rotation.y = elapsedTime * -2.0;
        accretionDisk.rotation.y = elapsedTime * -1.0;
        outerAccretionDisk.rotation.y = elapsedTime * -0.5;
        singularity.rotation.y = elapsedTime * 0.12;
        
        // Cập nhật hiệu ứng lensing
        lensingMat.uniforms.time.value = elapsedTime;
        lensingMat.uniforms.viewVector.value = camera.position;

        // Xoay tinh vân
        nebulaGroup.children.forEach(cloud => {
            cloud.rotation.z += cloud.userData.rotSpeed * 0.2;
        });

        // Xoay thiên hà
        galaxyArms.rotation.y += 0.0005;
        galaxyHalo.rotation.y += 0.0003;
        galaxyHalo.rotation.x += 0.0001;

        // Cập nhật mạng lưới thần kinh
        updateNeuralNetwork();

        // Cập nhật các vật thể nổi (ảnh + chữ)
        floatingItems.forEach((item) => {
            if(item.userData.delay > 0) {
                item.userData.delay--;
                item.visible = false;
                return;
            }
            item.visible = true;
            
            if (item !== selectedItem) {
                item.lookAt(camera.position);
            }

            const distanceToCenter = item.position.length();

            if (distanceToCenter < maxTravelDistance) {
                const directionOut = item.position.clone().normalize();
                if(directionOut.length() === 0) directionOut.set(1, 0, 0); 
                
                item.position.add(directionOut.multiplyScalar(item.userData.speed));
                item.position.y += Math.sin(elapsedTime * 2 + distanceToCenter * 0.05) * 0.12;

                if (item !== selectedItem && item.scale.x < 1) {
                    const progress = Math.min(1, (distanceToCenter - 16) / 40);
                    item.scale.set(progress, progress, progress);
                }
            } else {
                createFirework(item.position);
                resetItemPosition(item, false);
            }
        });

        updateFireworks();
    }

    // Luôn cập nhật controls và render (kể cả khi pause)
    controls.update();
    composer.render();
}

        // --- 8. Xử lý Tương thích Kích thước Màn hình (Resize) ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            lensingPass.uniforms.uAspect.value = window.innerWidth / window.innerHeight;
        });

        // Bắt đầu vòng lặp hoạt họa
        animate();
    </script>
</body>
